version: "3"
services:
    frontend:
        container_name: frontend
        build:
            context: ./front
            dockerfile: dockerfile
        image: frontend
        ports:
            - "3000:3000"
        volumes:
            - ./front:/app
    backend:
        container_name: backend
        build:
            context: ./back
            dockerfile: dockerfile
        image: backend
        ports:
            - "4000:4000"
        volumes:
            - ./back:/app
